<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORNO | Home</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Give+You+Glory&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/home.css">
</head>
<body>

    <header class="navbar">

        <!-- LOGO -->
        <div class="nav-left">
            <img src="images/logo.jpg" alt="FORNO Logo">
        </div>

        <!-- HAMBURGER (MOVED UP SO IT CAN'T BE PUSHED OFF SCREEN) -->
        <div class="hamburger">☰</div>

        <!-- NAV LINKS -->
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Menu</a>
            <a href="#">Gallery</a>
            <a href="#">Contact Us</a>
        </nav>

        <!-- SOCIAL ICONS -->
        <div class="nav-social">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-facebook-f"></i>
        </div>

    </header>

    <!-- Mobile Slide Menu -->
    <div class="mobile-menu">
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Menu</a>
        <a href="#">Gallery</a>
        <a href="#">Contact Us</a>
    </div>

    <section class="hero-slideshow">
        <div class="hero-slide" style="background-image: url('images/hero1.jpg');"></div>
        <div class="hero-slide" style="background-image: url('images/hero2.jpg');"></div>
        <div class="hero-slide" style="background-image: url('images/hero3.jpg');"></div>

        <div class="hero-overlay-box">
            <p class="welcome-text">Welcome to</p>
            <img src="images/logo2.jpg" class="hero-logo" alt="FORNO Logo">
            <p class="cuisine-text">Fine Italian Cuisine</p>
        </div>
    </section>

    <script src="js/home.js"></script>
</body>
</html>
